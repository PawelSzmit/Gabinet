<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a73e8" />
  <meta name="description" content="Gabinet – aplikacja do zarządzania gabinetem psychoterapeutycznym" />

  <!-- PWA / iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Gabinet" />
  <meta name="mobile-web-app-capable" content="yes" />

  <title>Gabinet</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

  <!-- ═══════════════════════════════════════════════
       SPLASH SCREEN
       Shown while app boots / checks auth state
  ════════════════════════════════════════════════ -->
  <div id="splash-screen" class="splash-screen">
    <div class="splash-screen__icon" aria-hidden="true">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
           width="48" height="48" fill="none" stroke="#ffffff"
           stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L3 6v6c0 5.25 3.75 10.15 9 11.25C17.25 22.15 21 17.25 21 12V6L12 2z"/>
        <rect x="9" y="11" width="6" height="5" rx="1"/>
        <path d="M10 11V9a2 2 0 1 1 4 0v2"/>
      </svg>
    </div>
    <h1 class="splash-screen__title">Gabinet</h1>
    <p class="splash-screen__subtitle">Psychoterapia</p>
    <div class="splash-screen__spinner" aria-label="Ładowanie…"></div>
  </div>

  <!-- ═══════════════════════════════════════════════
       AUTH SCREEN
       Shown when user is not authenticated
  ════════════════════════════════════════════════ -->
  <div id="auth-screen" class="auth-screen" hidden>
    <div class="auth-screen__logo" aria-hidden="true">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
           width="36" height="36" fill="none" stroke="#ffffff"
           stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L3 6v6c0 5.25 3.75 10.15 9 11.25C17.25 22.15 21 17.25 21 12V6L12 2z"/>
        <rect x="9" y="11" width="6" height="5" rx="1"/>
        <path d="M10 11V9a2 2 0 1 1 4 0v2"/>
      </svg>
    </div>

    <h1 class="auth-screen__title">Gabinet</h1>
    <p class="auth-screen__subtitle">
      Zaloguj się kontem Google, aby uzyskać dostęp<br>
      do swojego gabinetu psychoterapeutycznego.
    </p>

    <div class="auth-screen__form">
      <!-- Google Sign-In button rendered by GIS -->
      <div id="g-signin-btn"></div>

      <!-- Fallback / manual trigger button -->
      <button id="btn-google-signin" class="btn btn--google" type="button">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="20" height="20" aria-hidden="true">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          <path fill="none" d="M0 0h48v48H0z"/>
        </svg>
        Zaloguj się przez Google
      </button>

      <p id="auth-error" class="auth-screen__error" hidden></p>
    </div>

    <p class="auth-screen__footer">
      Dane przechowywane wyłącznie na Twoim Google Drive.
    </p>
  </div>

  <!-- ═══════════════════════════════════════════════
       MAIN APP
       Hidden until authenticated
  ════════════════════════════════════════════════ -->
  <div id="app-shell" hidden>

    <!-- ─── View container (calendar / patients / finance / settings) ─── -->
    <main id="view-container" role="main" aria-live="polite">
      <!-- Views are rendered here dynamically by JS -->
    </main>

    <!-- ─── Bottom tab bar ─── -->
    <nav class="tab-bar" role="tablist" aria-label="Nawigacja główna">

      <button class="tab-btn tab-btn--active" role="tab"
              data-view="calendar" aria-selected="true" aria-controls="view-container">
        <span class="tab-icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"
               fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
        </span>
        <span class="tab-label">Kalendarz</span>
      </button>

      <button class="tab-btn" role="tab"
              data-view="patients" aria-selected="false" aria-controls="view-container">
        <span class="tab-icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"
               fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </span>
        <span class="tab-label">Pacjenci</span>
      </button>

      <button class="tab-btn" role="tab"
              data-view="finance" aria-selected="false" aria-controls="view-container">
        <span class="tab-icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"
               fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="20" x2="18" y2="10"/>
            <line x1="12" y1="20" x2="12" y2="4"/>
            <line x1="6"  y1="20" x2="6"  y2="14"/>
            <line x1="2"  y1="20" x2="22" y2="20"/>
          </svg>
        </span>
        <span class="tab-label">Finanse</span>
      </button>

      <button class="tab-btn" role="tab"
              data-view="settings" aria-selected="false" aria-controls="view-container">
        <span class="tab-icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"
               fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06
                     a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09
                     A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83
                     l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09
                     A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83
                     l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09
                     a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83
                     l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09
                     a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </span>
        <span class="tab-label">Ustawienia</span>
      </button>

    </nav>
    <!-- /tab-bar -->

  </div>
  <!-- /app -->

  <!-- ═══════════════════════════════════════════════
       MODALS & BOTTOM SHEETS
       Empty containers – JS populates them at runtime
  ════════════════════════════════════════════════ -->

  <!-- Generic overlay backdrop -->
  <div id="modal-backdrop" class="modal-backdrop" hidden aria-hidden="true"></div>

  <!-- Session / appointment detail sheet -->
  <div id="sheet-session" class="bottom-sheet" hidden role="dialog"
       aria-modal="true" aria-label="Szczegóły wizyty">
    <div class="sheet-handle" aria-hidden="true"></div>
    <div class="sheet-content" id="sheet-session-content"></div>
  </div>

  <!-- Patient detail / edit sheet -->
  <div id="sheet-patient" class="bottom-sheet" hidden role="dialog"
       aria-modal="true" aria-label="Karta pacjenta">
    <div class="sheet-handle" aria-hidden="true"></div>
    <div class="sheet-content" id="sheet-patient-content"></div>
  </div>

  <!-- Finance / invoice sheet -->
  <div id="sheet-finance" class="bottom-sheet" hidden role="dialog"
       aria-modal="true" aria-label="Szczegóły płatności">
    <div class="sheet-handle" aria-hidden="true"></div>
    <div class="sheet-content" id="sheet-finance-content"></div>
  </div>

  <!-- Confirmation modal -->
  <div id="modal-confirm" class="modal" hidden role="alertdialog"
       aria-modal="true" aria-label="Potwierdzenie">
    <div class="modal-box">
      <h3 class="modal__title"></h3>
      <p  class="modal__message"></p>
      <div class="modal__actions">
        <button id="modal-confirm-btn" class="btn btn--primary">Potwierdź</button>
        <button id="modal-cancel-btn"  class="btn btn--ghost">Anuluj</button>
      </div>
    </div>
  </div>

  <!-- Toast / snackbar notifications -->
  <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="false"></div>

  <!-- Drive status indicators -->
  <div id="drive-loading-indicator" class="drive-loading" hidden aria-live="polite">
    <span class="drive-loading__spinner" aria-hidden="true"></span>
    <span>Synchronizacja…</span>
  </div>
  <div id="drive-error-toast" class="drive-error" hidden role="alert"></div>

  <!-- Offline banner -->
  <div id="offline-banner" class="offline-banner" hidden role="status">
    Brak połączenia z internetem – tryb offline
  </div>

  <!-- ═══════════════════════════════════════════════
       APP SCRIPTS (loaded in dependency order)
  ════════════════════════════════════════════════ -->
  <script src="js/utils.js"></script>
  <script src="js/data.js"></script>
  <script src="js/drive.js"></script>
  <script src="js/views/calendar.js"></script>
  <script src="js/views/patients.js"></script>
  <script src="js/views/finance.js"></script>
  <script src="js/views/settings.js"></script>
  <script src="js/app.js"></script>

  <!-- ═══════════════════════════════════════════════
       SERVICE WORKER REGISTRATION
  ════════════════════════════════════════════════ -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/sw.js', { scope: '/' })
          .then(function (registration) {
            console.log('[SW] Registered, scope:', registration.scope);

            // Listen for updates
            registration.addEventListener('updatefound', function () {
              var newWorker = registration.installing;
              newWorker.addEventListener('statechange', function () {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  // New content available – app.js can show an update prompt
                  document.dispatchEvent(new CustomEvent('sw:update-available'));
                }
              });
            });
          })
          .catch(function (err) {
            console.warn('[SW] Registration failed:', err);
          });

        // Reload once the new service worker takes over
        var refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', function () {
          if (!refreshing) {
            refreshing = true;
            window.location.reload();
          }
        });
      });
    }
  </script>

</body>
</html>
